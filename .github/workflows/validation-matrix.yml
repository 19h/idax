name: Validation Matrix

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  IDA_SDK_REPO: HexRaysSA/ida-sdk
  IDA_SDK_REF: 6929db6868a524496eb66e76e4ec6c9d720a0594 # IDA 9.4.0 release patch
  BUILD_TYPE: RelWithDebInfo
  IDAX_BUILD_EXAMPLES: ON
  IDAX_BUILD_EXAMPLE_ADDONS: ON
  IDAX_BUILD_EXAMPLE_TOOLS: ON

jobs:
  validation:
    name: ${{ matrix.profile }} - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            profile: compile-only
            build_dir: build-matrix-linux-gha-compile
            cc: gcc
            cxx: g++

          - os: ubuntu-latest
            name: linux-x86_64
            profile: unit
            build_dir: build-matrix-linux-gha-unit
            cc: gcc
            cxx: g++

          - os: macos-14
            name: macos-arm64
            profile: compile-only
            build_dir: build-matrix-macos14-gha-compile

          - os: macos-14
            name: macos-arm64
            profile: unit
            build_dir: build-matrix-macos14-gha-unit

          - os: windows-latest
            name: windows-x64
            profile: compile-only
            build_dir: build-matrix-windows-gha-compile
            msvc_arch: x64

          - os: windows-latest
            name: windows-x64
            profile: unit
            build_dir: build-matrix-windows-gha-unit
            msvc_arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout IDA SDK
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.IDA_SDK_REPO }}
          ref: ${{ env.IDA_SDK_REF }}
          path: ida-sdk
          submodules: recursive

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          github-token: ${{ github.token }}

      - name: Install IDA Pro
        env:
          HCLI_API_KEY: ${{ secrets.HCLI_KEY }}
        shell: bash
        run: |
          LICENSE_OUTPUT=$(uvx --from ida-hcli hcli --disable-updates license list)
          LICENSE_ID=$(printf '%s\n' "$LICENSE_OUTPUT" | python3 scripts/select_hcli_license.py)
          echo "::add-mask::$LICENSE_ID"
          echo "Selected active named IDA product license"
          
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ASSET_KEY="release/9.4/ida-pro/ida-pro_94_x64win.exe"
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            ASSET_KEY="release/9.4/ida-pro/ida-pro_94_x64linux.run"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            if [[ "$(uname -m)" == "arm64" ]]; then
              ASSET_KEY="release/9.4/ida-pro/ida-pro_94_armmac.app.zip"
            else
              ASSET_KEY="release/9.4/ida-pro/ida-pro_94_x64mac.app.zip"
            fi
          fi
          
          mkdir -p ./ida-installer
          uvx --from ida-hcli hcli --disable-updates download --output-dir ./ida-installer "$ASSET_KEY"

          INSTALLER_FILE=$(python3 -c "import glob; files=sorted(glob.glob('ida-installer/*')); print(files[0] if files else '')")
          if [[ -z "$INSTALLER_FILE" ]]; then
            echo "error: no installer file found in ./ida-installer"
            ls -la ./ida-installer
            exit 1
          fi
          echo "Using installer file: $INSTALLER_FILE"
          uvx --from ida-hcli hcli --disable-updates ida install --set-default --accept-eula --yes --license-id "$LICENSE_ID" "$INSTALLER_FILE"

      - name: Resolve IDASDK and IDADIR paths
        shell: bash
        run: |
          SDK_ROOT="${GITHUB_WORKSPACE}/ida-sdk"
          if [[ -f "${SDK_ROOT}/ida-cmake/bootstrap.cmake" ]]; then
            echo "IDASDK=${SDK_ROOT}" >> "$GITHUB_ENV"
          elif [[ -f "${SDK_ROOT}/src/cmake/bootstrap.cmake" || -f "${SDK_ROOT}/src/cmake/idasdkConfig.cmake" ]]; then
            echo "IDASDK=${SDK_ROOT}/src" >> "$GITHUB_ENV"
          elif [[ -f "${SDK_ROOT}/src/ida-cmake/bootstrap.cmake" ]]; then
            echo "IDASDK=${SDK_ROOT}/src" >> "$GITHUB_ENV"
          elif [[ -f "${SDK_ROOT}/cmake/bootstrap.cmake" || -f "${SDK_ROOT}/cmake/idasdkConfig.cmake" ]]; then
            echo "IDASDK=${SDK_ROOT}" >> "$GITHUB_ENV"
          else
            echo "error: unable to locate SDK CMake entry point in SDK checkout"
            exit 1
          fi

          IDADIR=$(python3 -c "import json, os; p = os.path.expanduser('~/.idapro/ida-config.json') if os.name != 'nt' else os.path.expandvars('%APPDATA%/Hex-Rays/IDA Pro/ida-config.json'); print(json.loads(open(p).read())['Paths']['ida-install-dir']) if os.path.exists(p) else print('')")
          if [[ "$RUNNER_OS" == "macOS" && -f "$IDADIR/Contents/MacOS/libida.dylib" ]]; then
            IDADIR="$IDADIR/Contents/MacOS"
          fi
          echo "IDADIR=$IDADIR" >> "$GITHUB_ENV"
          echo "Resolved IDADIR: $IDADIR"

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Select GCC toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"
          echo "CXX=${{ matrix.cxx }}" >> "$GITHUB_ENV"

      - name: Run validation profile
        shell: bash
        env:
          IDAX_BUILD_EXAMPLES: ${{ env.IDAX_BUILD_EXAMPLES }}
          IDAX_BUILD_EXAMPLE_ADDONS: ${{ env.IDAX_BUILD_EXAMPLE_ADDONS }}
          IDAX_BUILD_EXAMPLE_TOOLS: ${{ env.IDAX_BUILD_EXAMPLE_TOOLS }}
        run: |
          chmod +x scripts/run_validation_matrix.sh
          scripts/run_validation_matrix.sh "${{ matrix.profile }}" "${{ matrix.build_dir }}" "${{ env.BUILD_TYPE }}"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-${{ matrix.profile }}-${{ matrix.name }}
          path: |
            ${{ matrix.build_dir }}/CMakeCache.txt
            ${{ matrix.build_dir }}/CMakeFiles/CMakeOutput.log
            ${{ matrix.build_dir }}/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
