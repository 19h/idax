name: CI Log Privacy

on:
  workflow_run:
    workflows:
      - Integrations CI
      - Bindings CI
      - Validation Matrix
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-log-privacy-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  audit:
    name: Audit ${{ github.event.workflow_run.name }} complete logs
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audited revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Download and scan complete logs
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/idax-ci-run-${RUN_ID}.zip"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/logs" \
            --output "${archive}"
          python3 scripts/check_ci_log_privacy.py "${archive}"
