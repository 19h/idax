name: Set up MSVC environment
description: Export the Visual C++ command-line environment without a JavaScript action runtime

inputs:
  arch:
    description: Target architecture accepted by vcvarsall.bat
    required: false
    default: x64

runs:
  using: composite
  steps:
    - name: Configure MSVC Developer Command Prompt
      shell: pwsh
      env:
        IDAX_MSVC_ARCH: ${{ inputs.arch }}
      run: |
        & "$env:GITHUB_ACTION_PATH/setup-msvc.ps1" -Architecture "$env:IDAX_MSVC_ARCH"
